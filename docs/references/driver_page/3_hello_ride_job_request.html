<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grab Driver - Incoming Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#006e2e",
              "surface-container-highest": "#e5e2e1",
              "background": "#fcf9f8",
              "tertiary-container": "#fd6584",
              "outline": "#6d7b6c",
              "inverse-on-surface": "#f3f0ef",
              "secondary-container": "#b2eeb6",
              "on-secondary-fixed-variant": "#195127",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#005321",
              "on-tertiary-fixed-variant": "#8e0b36",
              "on-tertiary-fixed": "#400013",
              "tertiary-fixed-dim": "#ffb2bc",
              "surface-variant": "#e5e2e1",
              "surface-container": "#f0eded",
              "surface-dim": "#dcd9d9",
              "outline-variant": "#bccbb9",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed": "#ffd9dd",
              "on-tertiary": "#ffffff",
              "on-background": "#1b1c1c",
              "surface-bright": "#fcf9f8",
              "surface-container-low": "#f6f3f2",
              "primary-fixed-dim": "#52e078",
              "on-primary": "#ffffff",
              "primary-fixed": "#71fe91",
              "on-secondary-container": "#376e41",
              "error-container": "#ffdad6",
              "secondary": "#336a3d",
              "on-surface-variant": "#3d4a3d",
              "on-tertiary-container": "#680024",
              "surface": "#fcf9f8",
              "primary": "#006e2e",
              "error": "#ba1a1a",
              "on-secondary-fixed": "#002109",
              "on-primary-container": "#003a15",
              "on-surface": "#1b1c1c",
              "primary-container": "#00b14f",
              "surface-container-high": "#eae7e7",
              "inverse-surface": "#303030",
              "inverse-primary": "#52e078",
              "tertiary": "#af294c",
              "on-primary-fixed": "#002109",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#99d59e",
              "on-error": "#ffffff",
              "secondary-fixed": "#b5f1b9"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .countdown-ring {
        transition: stroke-dashoffset 1s linear;
        stroke-dasharray: 283;
        stroke-dashoffset: 80;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-background antialiased overflow-hidden">
<!-- Map Background (Contextual Layer) -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-80" data-alt="Modern dark-themed digital city map with glowing green routes and subtle traffic flow indicators in a clean urban environment" data-location="Singapore" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVEH7KqxfEjnzZgLupE94eLj047okftpXQPTqy9AKm25bzxcmIXmoVothEejijELxIfdawI5Wx1RbkKZxEjUKUIaRlbzc2v0d-PtxYeTw28JEEnJt-1p47oTnovw5FJ0fVqJ1Pl6ru0t2cJ2WQxfGsGtNnrrSTviRQWVP1ISMec3gHCUqUTuRoA0rWtBFcVxidEjZKQUJhndXf8SBTAJjZubVDABQQx8OKuM6DYU7zlD-_IawcvafqXYlwGPdZfXTSzKGECpfCSU0"/>
</div>
<!-- Header (Shared Component: TopAppBar) -->
<header class="bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl shadow-sm dark:shadow-none fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-4 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors scale-95 duration-200 active:opacity-80">
<span class="material-symbols-outlined text-zinc-500 dark:text-zinc-400">menu</span>
</button>
<h1 class="text-xl font-bold tracking-tight Inter text-emerald-700 dark:text-emerald-400">Hello Ride</h1>
</div>
<div class="flex items-center gap-2">
<div class="flex flex-col items-end mr-2">
<span class="label-md font-bold tracking-widest text-[10px] text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full uppercase">Online</span>
</div>
<button class="p-1 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors scale-95 duration-200 active:opacity-80">
<span class="material-symbols-outlined text-zinc-500 dark:text-zinc-400">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Incoming Request UI -->
<main class="relative z-10 pt-20 pb-8 px-4 h-screen flex flex-col justify-end max-w-md mx-auto">
<!-- Request Status Chips (Bento Style) -->
<div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
<div class="bg-primary px-4 py-2 rounded-full flex items-center gap-2 shadow-sm shrink-0">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-white text-xs font-bold uppercase tracking-wider">High Demand</span>
</div>
<div class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 shadow-sm shrink-0">
<span class="material-symbols-outlined text-primary text-sm">payments</span>
<span class="text-on-surface text-xs font-bold uppercase tracking-wider">HelloPay</span>
</div>
</div>
<!-- Job Detail Card -->
<div class="bg-surface-container-lowest rounded-3xl p-6 shadow-2xl relative overflow-hidden">
<!-- Background Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16"></div>
<!-- Service & Earnings Header -->
<div class="flex justify-between items-start mb-8 relative">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="text-primary font-bold text-lg">Hello Ride</span>
<span class="bg-primary/10 text-primary px-2 py-0.5 rounded text-[10px] font-black uppercase">Plus</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm">directions_car</span>
<p class="text-on-surface-variant text-sm font-medium">1.2 km away (4 mins)</p>
</div>
</div>
<div class="text-right">
<p class="label-md uppercase tracking-widest text-on-surface-variant font-bold text-[10px] mb-1">Net Earnings</p>
<p class="text-3xl font-black tracking-tighter text-on-surface">$14.50</p>
</div>
</div>
<!-- Countdown Timer (Central Visual Anchor) -->
<div class="flex justify-center mb-8">
<div class="relative w-32 h-32 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary countdown-ring" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="text-4xl font-black text-on-surface">12</span>
<span class="label-md text-[10px] uppercase font-bold text-on-surface-variant">Secs</span>
</div>
</div>
</div>
<!-- Route Details -->
<div class="space-y-6 mb-8 relative">
<!-- Vertical Line for Route -->
<div class="absolute left-[11px] top-6 bottom-6 w-0.5 bg-dashed border-l-2 border-dashed border-outline-variant opacity-50"></div>
<!-- Pickup -->
<div class="flex gap-4 items-start relative z-10">
<div class="w-6 h-6 rounded-full bg-emerald-50 flex items-center justify-center shrink-0 mt-1">
<div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
</div>
<div class="flex-1">
<p class="label-md uppercase text-[10px] font-bold text-on-surface-variant tracking-wider mb-0.5">Pickup</p>
<p class="text-sm font-bold text-on-surface leading-tight">Marina Bay Sands, Tower 3</p>
<p class="text-xs text-on-surface-variant">10 Bayfront Ave, Singapore 018956</p>
</div>
</div>
<!-- Drop-off -->
<div class="flex gap-4 items-start relative z-10">
<div class="w-6 h-6 rounded-full bg-tertiary/10 flex items-center justify-center shrink-0 mt-1">
<span class="material-symbols-outlined text-tertiary text-xs" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="flex-1">
<p class="label-md uppercase text-[10px] font-bold text-on-surface-variant tracking-wider mb-0.5">Drop-off</p>
<p class="text-sm font-bold text-on-surface leading-tight">Changi Airport Terminal 4</p>
<p class="text-xs text-on-surface-variant">Airport Blvd., Singapore 819665</p>
</div>
</div>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-4">
<button class="w-full py-5 rounded-2xl bg-gradient-to-r from-primary to-primary-container text-white text-lg font-black tracking-wide shadow-lg shadow-primary/20 scale-97 active:scale-95 transition-all">
                    ACCEPT JOB
                </button>
<div class="flex gap-4">
<button class="flex-1 py-4 rounded-xl bg-surface-container-high text-on-surface-variant text-sm font-bold transition-all active:opacity-80">
                        REJECT
                    </button>
<button class="flex-1 py-4 rounded-xl bg-surface-container-high text-on-surface-variant text-sm font-bold transition-all active:opacity-80">
                        MORE INFO
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation (Shared Component: BottomNavBar - Contextual Suppression Check: Active but partially hidden by job card) -->
<!-- Navigation is hidden during focused task "Job Acceptance" to prioritize the action canvas -->
<!-- Floating Safety Action (Contextual) -->
<div class="fixed left-6 bottom-10 z-50">
<button class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-full shadow-lg flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">gpp_maybe</span>
</button>
</div>
</body></html>
