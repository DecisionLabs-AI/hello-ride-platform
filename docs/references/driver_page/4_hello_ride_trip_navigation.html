</div>
</header>

<div class="bg-primary w-12 h-12 rounded-lg flex flex-col items-center justify-center text-white">

<span class="text-[10px] uppercase font-bold">m</span>
</div>
<div class="flex-1">

<h2 class="text-title-md font-bold text-on-surface leading-tight">Robinson Rd / Marina Blvd</h2>
</div>
<button class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-full text-on-surface">
<span class="material-symbols-outlined">navigation</span>
</button>
</div>
</div>

<div class="absolute -bottom-1 -right-1 bg-primary text-white text-[10px] px-1 rounded-sm font-bold border-2 border-white">4.9 ★</div>
</div>
<div>
<h3 class="text-title-md font-bold text-on-surface">Alex Johnston</h3>
<p class="text-body-md text-on-surface-variant">GrabCar Premium</p>
</div>
</div>
<div class="text-right">
<p class="text-body-md font-bold text-primary">$24.50</p>
<p class="text-[10px] uppercase font-bold text-on-surface-variant tracking-wider">Cash Payment</p>
</div>
</div>
<!-- Route Overlay -->

<div class="flex flex-col items-center py-1">
<div class="w-2.5 h-2.5 rounded-full border-2 border-primary"></div>
<div class="w-0.5 flex-1 bg-outline-variant my-1"></div>
<div class="w-2.5 h-2.5 bg-tertiary rounded-sm"></div>
</div>
<div class="flex flex-col gap-4 flex-1">
